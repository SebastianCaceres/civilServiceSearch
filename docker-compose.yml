services:
  postgres:
    image: postgres:17-alpine
    container_name: civilservice-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=civilservice
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - .pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d civilservice"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: civilservice-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - CIVILSERVICE_SYNC_APP_TOKEN=${CIVILSERVICE_SYNC_APP_TOKEN}
      - CIVILSERVICE_SYNC_SECRET_TOKEN=${CIVILSERVICE_SYNC_SECRET_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy

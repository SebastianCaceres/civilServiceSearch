services:
  app:
    image: ghcr.io/sebastiancaceres/civilservicesearch:latest
    # build: .
    container_name: civilservice-search
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - CIVILSERVICE_SYNC_APP_TOKEN=${CIVILSERVICE_SYNC_APP_TOKEN}
      - CIVILSERVICE_SYNC_SECRET_TOKEN=${CIVILSERVICE_SYNC_SECRET_TOKEN}
    volumes:
      - ./lucene-index:/app/lucene-index

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup

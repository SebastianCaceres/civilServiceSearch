spring.application.name=search

# PostgreSQL Database Connection Settings
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/civilservice}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JDBC batch settings for fast imports
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# H2 Console Settings
spring.h2.console.enabled=false

# Jackson JSON Settings
spring.jackson.property-naming-strategy=SNAKE_CASE

# Civil Service Sync Settings
civilservice.sync.url=https://data.cityofnewyork.us/api/v3/views/a9md-ynri/query.json
civilservice.sync.limit=10000000
civilservice.sync.cron=0 0 2 * * ?
civilservice.sync.batch-size=200000
civilservice.sync.app-token=${CIVILSERVICE_SYNC_APP_TOKEN:}
civilservice.sync.secret-token=${CIVILSERVICE_SYNC_SECRET_TOKEN:}

# Civil Service List Sync Settings (Active & Terminated candidates)
civilservice.sync.list.active-dataset-id=vx8i-nprf
civilservice.sync.list.terminated-dataset-id=qu8g-sxqf
civilservice.sync.list.limit=10000000

# Hibernate Search Properties
spring.jpa.properties.hibernate.search.backend.directory.type=local-filesystem
spring.jpa.properties.hibernate.search.backend.directory.root=./lucene-index

# Linear Regression and Prediction settings
civilservice.predict.skip-threshold=1.5
civilservice.predict.default-days-per-rank=2.0



<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:hx-on="http://www.w3.org/1999/xhtml" lang="en">
<!-- Head Fragment -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">NYC Civil Service Search</title>
</head>
<body>

    <!-- Header Navbar Fragment -->
    <header th:fragment="header" class="mb-4">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container-fluid max-width-container" style="max-width: 900px; margin: 0 auto; width: 100%;">
                <a class="navbar-brand fw-bold" th:href="@{/}">NYC Civil Service Portal</a>
            </div>
        </nav>
    </header>



    <!-- Footer Fragment -->
    <footer th:fragment="footer" class="text-center py-4 text-secondary small mt-auto border-top bg-white">
        <p class="mb-0">&copy; 2026 NYC Civil Service Portal. Powered by Hibernate Search & Apache Lucene.</p>
    </footer>

    <div th:fragment="altcha-widget">

        <div id="captcha-container" th:if="${challenge}" style="width: 100%; box-sizing: border-box; margin: 0.5rem 0;">

            <altcha-widget th:hx-get="@{/verify}"
                           hx-trigger="verified"
                           hx-include="this"
                           hx-target="#captcha-container"
                           hx-swap="innerHTML"
                           th:attr='challengejson=|{"algorithm":"${algorithm}","challenge":"${challenge}","maxnumber":${maxnumber},"salt":"${salt}","signature":"${signature}"}|'
            </altcha-widget>
        </div>
    </div>

    <th:block th:fragment="captcha-success"></th:block>

    <div th:fragment="captcha-error">
        <div style="padding: 1rem; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; border-radius: 4px; text-align: center; font-weight: bold; margin: 0.5rem 0;">
            ❌ Verification failed. Please try again.
        </div>
        <div id="captcha-container"
             th:hx-get="@{/captcha-fragment}"
             hx-trigger="load"
             hx-swap="innerHTML"
             style="width: 100%; box-sizing: border-box; margin: 0.5rem 0;">
        </div>
    </div>

    <div th:fragment="captcha-missing">
        <div style="padding: 1rem; background: #fff3cd; color: #856404; border: 1px solid #ffeeba; border-radius: 4px; text-align: center; font-weight: bold; margin: 0.5rem 0;">
            ⚠️ Puzzle data missing. Please try again.
        </div>
        <div id="captcha-container"
             th:hx-get="@{/captcha-fragment}"
             hx-trigger="load"
             hx-swap="innerHTML"
             style="width: 100%; box-sizing: border-box; margin: 0.5rem 0;">
        </div>
    </div>

</body>
</html>

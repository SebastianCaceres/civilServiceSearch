<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:hx-on="http://www.w3.org/1999/xhtml" lang="en">
<!-- Head Fragment -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">NYC Civil Service Search</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Header Navbar Fragment -->
    <header th:fragment="header" class="mb-4">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container-fluid max-width-container" style="max-width: 900px; margin: 0 auto; width: 100%;">
                <a class="navbar-brand fw-bold" th:href="@{/}">NYC Civil Service Portal</a>
            </div>
        </nav>
    </header>

    <!-- Search Bar Fragment -->
    <div th:fragment="searchBar(q)">
        <label>
            <input id="search-query" type="text" name="q" th:value="${q}" placeholder="Search names/titles (supports &quot;quotes&quot; and -exclude)" autofocus
                   th:hx-get="@{/results}" hx-trigger="keyup[key=='Enter']" hx-swap="none" hx-push-url="true" hx-indicator="#htmx-indicator"
                   hx-on::after-request="document.getElementById('navbar-top')?.classList.add('has-results'); document.getElementById('search-container')?.classList.add('has-results');">
        </label>
        <button th:hx-get="@{/results}" hx-include="#search-query" hx-swap="none" hx-push-url="true" hx-indicator="#htmx-indicator"
                hx-on::after-request="document.getElementById('navbar-top')?.classList.add('has-results'); document.getElementById('search-container')?.classList.add('has-results');">
            <span id="htmx-indicator" class="htmx-indicator"><span class="spinner"></span></span>Search
        </button>
        <p class="hint">Google-like tips: use quoted phrases and <code>-word</code> to exclude terms.</p>
    </div>

    <!-- Footer Fragment -->
    <footer th:fragment="footer" class="text-center py-4 text-secondary small mt-auto border-top bg-white">
        <p class="mb-0">&copy; 2026 NYC Civil Service Portal. Powered by Hibernate Search & Apache Lucene.</p>
    </footer>

</body>
</html>

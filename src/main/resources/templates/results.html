<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="top">
    <div th:replace="~{fragments :: searchBar(${q})}"></div>
</div>

<div id="search-results" th:fragment="results-list" th:attr="hx-swap-oob=${isHtmx} ? 'true' : null">
    <div class="meta" th:if="${q != null and !q.isBlank()}">
        About <strong th:text="${resultCount}">0</strong> results in <strong th:text="${searchMs}">0</strong> ms
    </div>

    <div th:if="${q == null or q.isBlank()}">Enter a search query to see results.</div>
    <div th:if="${q != null and !q.isBlank() and #lists.isEmpty(results)}">No results found.</div>

    <div th:each="candidate : ${results}" class="result">
        <a class="title-link" th:href="@{/record/{id}(id=${candidate.id}, q=${q})}" th:utext="${candidate.fullNameHtml}"></a>
        <div class="subtitle" th:utext="${candidate.titleHtml}"></div>
        <div class="agency" th:utext="${candidate.agencyHtml}"></div>
        <div class="details">
            Exam #<span th:text="${candidate.examNo}"></span>
            | List #<span th:text="${candidate.listNo}"></span>
            | Status <span th:text="${candidate.status}"></span>
            | Score <span th:text="${candidate.score}"></span>
        </div>
        <div>
            <!-- Case 2: Certified (but not appointed) -->
            <span th:if="${candidate.isCertified}" class="badge badge-primary">
                Reachable by [[${candidate.certifiedAgency}]] on [[${candidate.formattedCertifiedDate}]]
            </span>

            <!-- Case 3: Reached (but not selected/certified) -->
            <span th:if="${candidate.isReached}" class="badge badge-warning">
                Reached by [[${candidate.latestReachAgency}]] on [[${candidate.formattedLatestReachDate}]]
            </span>
        </div>
    </div>
</div>
</body>
</html>

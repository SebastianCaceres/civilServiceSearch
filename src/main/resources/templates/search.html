<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civil Service Search</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; }
        .container { width: min(800px, 92vw); text-align: center; }
        h1 { margin-bottom: 1.25rem; }
        form { display: flex; gap: 0.5rem; }
        input[type="text"] { flex: 1; padding: 0.75rem; font-size: 1rem; }
        button { padding: 0.75rem 1.2rem; cursor: pointer; }
        button:disabled { cursor: not-allowed; opacity: 0.8; }
        .hint { color: #555; margin-top: 0.8rem; font-size: 0.95rem; }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0,0,0,0.15);
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.htmx-indicator {
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Civil Service Search</h1>
    <form method="get" action="/results" hx-boost="true">
        <input type="text" name="q" placeholder="Search names/titles (supports &quot;quotes&quot; and -exclude)" autofocus>
        <button type="submit">
            <span class="htmx-indicator"><span class="spinner"></span></span>Search
        </button>
    </form>
    <p class="hint">Google-like tips: use quoted phrases and <code>-word</code> to exclude terms.</p>
</div>
</body>
</html>

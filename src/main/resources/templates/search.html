<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civil Service Search</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Load ALTCHA Web Component -->
    <script async defer th:src="@{/webjars/altcha/dist/altcha.js}" type="module"></script>
    <!-- Load HTMX -->
    <script th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
</head>
<body>
<div class="container" id="navbar-top">
    <h1>Civil Service Search</h1>
    
    <div th:if="${error}" style="background-color: #f8d7da; color: #721c24; padding: 0.75rem; border: 1px solid #f5c6cb; border-radius: 4px; margin: 0 auto 1rem auto; max-width: 500px; text-align: left; box-sizing: border-box; width: 100%;">
        <span th:text="${error}"></span>
    </div>
    
    <form id="search-form" th:action="@{/results}" method="GET" 
          style="display: flex; flex-direction: column; gap: 1rem; max-width: 500px; margin: 0 auto; text-align: left; background: #fff; padding: 1.5rem; border-radius: 8px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; box-sizing: border-box;">
        <div style="display: flex; flex-direction: column; gap: 0.4rem; width: 100%;">
            <label for="fullName" style="font-weight: bold; font-size: 0.9rem; color: #333;">Full Name <span style="color: red;">*</span></label>
            <input id="fullName" type="text" name="fullName" th:value="${fullName}" placeholder="e.g. John Doe" autofocus required style="padding: 0.65rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; width: 100%; box-sizing: border-box;">
        </div>
        <div style="display: flex; flex-direction: column; gap: 0.4rem; width: 100%;">
            <label for="examOrTitle" style="font-weight: bold; font-size: 0.9rem; color: #333;">Exam Number or Job Title <span style="color: red;">*</span></label>
            <input id="examOrTitle" type="text" name="examOrTitle" th:value="${examOrTitle}" placeholder="e.g. 5054 or Accountant" required style="padding: 0.65rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; width: 100%; box-sizing: border-box;">
        </div>

        <!-- The ALTCHA CAPTCHA Widget -->
        <div id="captcha-container"
             th:hx-get="@{/captcha-fragment}"
             hx-trigger="load"
             hx-swap="innerHTML"
             style="width: 100%; box-sizing: border-box; margin: 0.5rem 0;">

            <div style="padding: 1rem; text-align: center; color: #666; background: #f9f9f9; border-radius: 4px; border: 1px dashed #ccc;">
                Loading security check...
            </div>
        </div>
        <button type="submit" style="padding: 0.75rem; background: #007bff; color: #fff; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; width: 100%; box-sizing: border-box;">
            Search
        </button>
    </form>
</div>
</body>
</html>
